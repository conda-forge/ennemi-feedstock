{% set python_min = "3.11" %}
{% set name = "ennemi" %}
{% set version = "1.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  #url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/ennemi-{{ version }}.tar.gz
  #sha256: 4658e7a70eabeda050d6710bff49f65397570874d8525b8aec342a249c9cb671
  url: https://github.com/polsys/ennemi/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 7ce768ae1a60ada5603315ffd4766ba46dab24de8e773edf26734015b8af5d5a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.24
    - scipy >=1.10,<2.dev0

test:
  imports:
    - ennemi
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://polsys.github.io/ennemi/
  summary: Non-linear correlation detection with mutual information
  dev_url: https://github.com/polsys/ennemi/
  license: MIT
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - camaramm
